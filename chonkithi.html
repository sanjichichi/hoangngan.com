<section class="exam-section">

    <h1>CHỌN KỲ THI OLYMPIC</h1>

    <p>
        Vui lòng lựa chọn kỳ thi trước khi bắt đầu.
    </p>

    <div class="exam-grid">

        <label class="exam-card">

            <input type="radio"
                   name="exam"
                   value="Olympic Toán 2026">

            <div class="icon">📐</div>

            <h2>Olympic Toán</h2>

            <span>30 câu hỏi</span>

            <span>45 phút</span>

        </label>

        <label class="exam-card">

            <input type="radio"
                   name="exam"
                   value="Olympic Ngữ văn 2026">

            <div class="icon">📚</div>

            <h2>Olympic Ngữ văn</h2>

            <span>30 câu hỏi</span>

            <span>45 phút</span>

        </label>

        <label class="exam-card">

            <input type="radio"
                   name="exam"
                   value="Olympic Tiếng Anh 2026">

            <div class="icon">🇬🇧</div>

            <h2>Olympic Tiếng Anh</h2>

            <span>30 câu hỏi</span>

            <span>45 phút</span>

        </label>

        <label class="exam-card">

            <input type="radio"
                   name="exam"
                   value="Olympic tổng hợp 2026">

            <div class="icon">🏆</div>

            <h2>Olympic Tổng hợp</h2>

            <span>60 câu hỏi</span>

            <span>60 phút</span>

        </label>

    </div>

    <button id="btnThi">
        🚀 VÀO THI
    </button>

</section>
<script>
document.getElementById("btnThi").onclick = function(){

    const exam = document.querySelector(
        'input[name="exam"]:checked'
    );

    if(!exam){

        alert("Vui lòng chọn kỳ thi.");

        return;

    }

    console.log(exam.value);

    localStorage.setItem("kyThi", exam.value);

    window.location.href = "xacnhan.html";

};
const btn =
document.getElementById(
"taiKhoanBtn"
);

if(btn){

    btn.innerHTML =
    localStorage.getItem("hoTen")
    + " ▼";

    btn.addEventListener(
    "click",
    function(e){

        e.preventDefault();

        const menu =
        document.getElementById(
        "userDropdown"
        );

        menu.style.display =
        menu.style.display ===
        "block"
        ? "none"
        : "block";

    });

}
function dangXuat(){

    if(confirm(
    "Bạn muốn đăng xuất?"
    )){

        localStorage.clear();

        window.location.href =
        "index.html";

    }

}
</script>
</body>
